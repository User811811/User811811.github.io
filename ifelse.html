<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Link Macro Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .container {
    background: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    max-width: 650px;
    width: 100%;
  }
  h2 { margin-top: 0; }
  label {
    display: block;
    margin-top: 15px;
    font-size: 0.9em;
    font-weight: bold;
    color: #555;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    font-family: monospace;
  }
  select {
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    font-family: inherit;
    background-color: #fff;
    cursor: pointer;
  }
  .row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .row > select {
    flex: 0 0 auto;
  }
  .row > input {
    flex: 1 1 auto;
  }
  .input-group {
    background: #fdfdfd;
    border: 1px solid #eee;
    padding: 15px;
    margin-top: 10px;
    border-left: 4px solid #0056b3;
  }
  button {
    margin-top: 25px;
    padding: 12px 20px;
    background: #0056b3;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 1em;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: #004494; }
  textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    font-family: monospace;
    font-size: 0.9em;
    resize: vertical;
    background-color: #eef1f5;
  }
  
  /* Tooltip Styles */
  .tooltip {
    position: relative;
    display: inline-block;
    cursor: help;
    color: #0056b3;
    margin-left: 5px;
    font-weight: bold;
    background: #eef1f5;
    border-radius: 50%;
    width: 18px;
    text-align: center;
    line-height: 18px;
    font-size: 0.8em;
  }
  .tooltip .tooltiptext {
    visibility: hidden;
    width: 280px;
    background-color: #333;
    color: #fff;
    text-align: left;
    border-radius: 6px;
    padding: 12px;
    position: absolute;
    z-index: 1;
    bottom: 135%;
    left: 50%;
    margin-left: -140px;
    opacity: 0;
    transition: opacity 0.3s;
    font-weight: normal;
    font-size: 0.9em;
    box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
    line-height: 1.4;
  }
  .tooltip .tooltiptext::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    margin-left: -5px;
    border-width: 5px;
    border-style: solid;
    border-color: #333 transparent transparent transparent;
  }
  .tooltip:hover .tooltiptext {
    visibility: visible;
    opacity: 1;
  }

  /* Toast Notification Styles */
  .toast {
    visibility: hidden;
    min-width: 250px;
    background-color: #d9534f;
    color: #fff;
    text-align: center;
    border-radius: 4px;
    padding: 12px;
    position: fixed;
    z-index: 1000;
    left: 50%;
    top: 10px;
    transform: translateX(-50%);
    font-size: 0.95em;
    font-weight: bold;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.3s, top 0.3s;
  }
  .toast.show {
    visibility: visible;
    opacity: 1;
    top: 30px;
  }
</style>
</head>
<body>

<div id="toast" class="toast">Whitespace is not allowed! Spaces have been removed.</div>

<div class="container">
  <h2>Ad Link Macro Generator</h2>
  <p>Fill in the variables below. <strong>Whitespace is strictly disabled.</strong></p>

  <label for="baseLink">Base Tracking Link (Prepended)</label>
  <input type="text" id="baseLink" value="ad.doubleclick.net/ddm/clk/" oninput="sanitizeInput(this)">

  <div class="input-group">
    <label>
      Condition 1 Keyword Match & Input
      <div class="tooltip">?
        <span class="tooltiptext"><strong>Note on Spacing & Regex:</strong> Spaces are not allowed, so "Credit Limit" must become "CreditLimit" (or use URL encoding like <code>Credit%20Limit</code> or regex wildcards like <code>Credit.*Limit</code>). The tool will automatically wrap your keyword in the correct regex characters for "Contains" (<code>.*</code>) or "Exact Match" (<code>^...$</code>).</span>
      </div>
    </label>
    <div class="row">
      <select id="cond1Match">
        <option value="contains">Contains</option>
        <option value="exact">Exact Match</option>
      </select>
      <input type="text" id="cond1Key" value="CreditLimit" oninput="sanitizeInput(this)" placeholder="Keyword">
    </div>
    
    <label for="cond1Out">Condition 1 Output Link</label>
    <input type="text" id="cond1Out" value="SHqv?aff_sub5=AFFIMPACTFI" oninput="sanitizeInput(this)">
  </div>

  <div class="input-group">
    <label>
      Condition 2 Keyword Match & Input
      <div class="tooltip">?
        <span class="tooltiptext"><strong>Note on Spacing & Regex:</strong> Spaces are not allowed, so "Credit Limit" must become "CreditLimit" (or use URL encoding like <code>Credit%20Limit</code> or regex wildcards like <code>Credit.*Limit</code>). The tool will automatically wrap your keyword in the correct regex characters for "Contains" (<code>.*</code>) or "Exact Match" (<code>^...$</code>).</span>
      </div>
    </label>
    <div class="row">
      <select id="cond2Match">
        <option value="contains">Contains</option>
        <option value="exact">Exact Match</option>
      </select>
      <input type="text" id="cond2Key" value="NewCard" oninput="sanitizeInput(this)" placeholder="Keyword">
    </div>
    
    <label for="cond2Out">Condition 2 Output Link</label>
    <input type="text" id="cond2Out" value="SHqw?aff_sub5=AFFIMPACTFICC" oninput="sanitizeInput(this)">
  </div>

  <div class="input-group" style="border-left-color: #d9534f;">
    <label for="fallbackOut">Fallback Link (If neither matches)</label>
    <input type="text" id="fallbackOut" value="554686360;363508829;w?{gwlurl:plain}" oninput="sanitizeInput(this)">
  </div>

  <div class="input-group" style="border-left-color: #5cb85c;">
    <label for="appendedLink">Appended Tracking Link (Suffix)</label>
    <input type="text" id="appendedLink" value="&extra_param=123" oninput="sanitizeInput(this)">
  </div>

  <button onclick="generateLink()">Generate Link String</button>

  <label for="result">Generated Output:</label>
  <textarea id="result" readonly placeholder="Your generated link will appear here..."></textarea>
</div>

<script>
  let toastTimeout;

  // Function to check for whitespace, notify user, and remove it
  function sanitizeInput(inputElement) {
    if (/\s/.test(inputElement.value)) {
      showToast();
      inputElement.value = inputElement.value.replace(/\s/g, '');
    }
  }

  // Function to show the warning notification temporarily
  function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toast.classList.remove("show");
    }, 3000);
  }

  function generateLink() {
    // Grab base, fallback, and appends
    const base = document.getElementById('baseLink').value;
    const fb = document.getElementById('fallbackOut').value;
    const app = document.getElementById('appendedLink').value;

    // Grab Condition 1 values and format regex
    const c1Match = document.getElementById('cond1Match').value;
    const c1kRaw = document.getElementById('cond1Key').value;
    const c1k = c1Match === 'contains' ? `.*${c1kRaw}.*` : `^${c1kRaw}$`;
    const c1o = document.getElementById('cond1Out').value;

    // Grab Condition 2 values and format regex
    const c2Match = document.getElementById('cond2Match').value;
    const c2kRaw = document.getElementById('cond2Key').value;
    const c2k = c2Match === 'contains' ? `.*${c2kRaw}.*` : `^${c2kRaw}$`;
    const c2o = document.getElementById('cond2Out').value;

    // Build the nested macro structure using the freshly formatted regex strings
    let outputString = `${base}{if(iradname~"${c1k}","${c1o}","{if(iradname~"${c2k}","${c2o}","${fb}")}")}${app}`;
    
    // Final safety check to strip any whitespace globally before outputting
    outputString = outputString.replace(/\s+/g, '');
    
    document.getElementById('result').value = outputString;
  }
</script>

</body>
</html>
